linear_regression:
  regressor__fit_intercept: true
  regressor__normalize: true
ridge: &id001
  regressor__alpha: 1.
  regressor__fit_intercept: true
  regressor__normalize: true
br: *id001
svr:
  regressor__C: 100.
  regressor__epsilon: 1.
  regressor__kernel: rbf
  regressor__tol: 1e-5
knn:
  regressor__metric: cosine
  regressor__n_neighbors: 10
  regressor__weights: uniform
rfr:
  regressor__n_estimators: 50
gbr:
  regressor__learning_rate: 0.01
  regressor__min_samples_leaf: 10
  regressor__min_samples_split: 0.1
  regressor__n_estimators: 300
  regressor__subsample: 0.2
gpr:
  regressor__alpha: 5.5e-8
  regressor__n_restarts_optimizer: 3
